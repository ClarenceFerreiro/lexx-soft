name: Public API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run public smoke and schema tests
        run: pytest tests/public/ --html=reports/report.html --self-contained-html -v --tb=short -m "not binance"
        env:
          PYTHONPATH: src

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: reports/report.html
          if-no-files-found: error

      # Auth tests require LEXX_ACCESS_TOKEN from browser. Run locally only.
      # - name: Run authenticated tests
      #   run: pytest tests/auth/ -v --tb=short
